<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Defender — Synthwave</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0514;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: #ff2d95;
    }
    h1 {
      font-size: 1rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      text-shadow: 0 0 12px #ff2d95, 0 0 24px #b026ff;
    }
    canvas {
      display: block;
      border: 2px solid #00f5d4;
      box-shadow:
        0 0 20px rgba(0, 245, 212, 0.35),
        inset 0 0 60px rgba(176, 38, 255, 0.08);
    }
    .hint {
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: #00f5d4;
      opacity: 0.85;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <h1>Cosmic Defender</h1>
  <canvas id="game" width="800" height="600"></canvas>
  <p class="hint">방향키로 이동 · 지형에 닿으면 게임 오버</p>
  <script src="game.js"></script>
</body>
</html>
