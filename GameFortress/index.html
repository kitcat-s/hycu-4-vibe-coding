<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Artillery</title>
  <style>
    :root {
      --sky: #0d1f72;
      --earth: #6e4a2a;
      --earth-shadow: #52351d;
      --ui-bg: #121737;
      --ui-border: #7ea0ff;
      --text-main: #e4ecff;
      --text-sub: #9ec0ff;
      --cannon: #d6d9e8;
      --cannon-dark: #8f95b5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #070a18;
      font-family: "Courier New", monospace;
      image-rendering: pixelated;
      color: var(--text-main);
    }

    .game-frame {
      border: 4px solid #9ab4ff;
      box-shadow:
        0 0 0 4px #23326d,
        0 12px 36px rgba(0, 0, 0, 0.55);
      image-rendering: pixelated;
    }

    canvas {
      display: block;
      width: 800px;
      height: 600px;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>
  <div class="game-frame">
    <canvas id="game" width="800" height="600" aria-label="레트로 포병 게임 화면"></canvas>
  </div>

  <script src="./js/core.js"></script>
  <script src="./js/terrain.js"></script>
  <script src="./js/render.js"></script>
  <script src="./js/physics.js"></script>
  <script src="./js/input.js"></script>
  <script src="./js/main.js"></script>
</body>

</html>
