<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Artillery</title>
  <style>
    :root {
      --sky: #0d1f72;
      --earth: #6e4a2a;
      --earth-shadow: #52351d;
      --ui-bg: #121737;
      --ui-border: #7ea0ff;
      --text-main: #e4ecff;
      --text-sub: #9ec0ff;
      --cannon: #d6d9e8;
      --cannon-dark: #8f95b5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #070a18;
      font-family: "Courier New", monospace;
      image-rendering: pixelated;
      color: var(--text-main);
    }

    .game-frame {
      border: 4px solid #9ab4ff;
      box-shadow:
        0 0 0 4px #23326d,
        0 12px 36px rgba(0, 0, 0, 0.55);
      image-rendering: pixelated;
    }

    canvas {
      display: block;
      width: 800px;
      height: 600px;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>
  <div class="game-frame">
    <canvas id="game" width="800" height="600" aria-label="레트로 포병 게임 화면"></canvas>
  </div>

  <script>
    const WIDTH = 800;
    const HEIGHT = 600;
    const UI_HEIGHT = 56;
    const GRID = 4;

    const TURN_TEXT = "PLAYER 1";
    const windValue = Math.floor(Math.random() * 21) - 10;

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    function snap(v) {
      return Math.floor(v / GRID) * GRID;
    }

    function createTerrainPoints() {
      const points = [];
      const step = 16;
      let y = 420 + Math.floor(Math.random() * 50);

      for (let x = 0; x <= WIDTH; x += step) {
        const slope = (Math.random() - 0.5) * 26;
        y += slope;
        y = Math.max(290, Math.min(540, y));
        points.push({ x: snap(x), y: snap(y) });
      }

      return points;
    }

    function terrainHeightAt(points, x) {
      for (let i = 1; i < points.length; i++) {
        if (x <= points[i].x) {
          const p0 = points[i - 1];
          const p1 = points[i];
          const t = (x - p0.x) / (p1.x - p0.x || 1);
          return snap(p0.y + (p1.y - p0.y) * t);
        }
      }
      return points[points.length - 1].y;
    }

    function drawUi() {
      ctx.fillStyle = "#121737";
      ctx.fillRect(0, 0, WIDTH, UI_HEIGHT);

      ctx.strokeStyle = "#7ea0ff";
      ctx.lineWidth = 4;
      ctx.strokeRect(2, 2, WIDTH - 4, UI_HEIGHT - 4);

      ctx.fillStyle = "#e4ecff";
      ctx.font = "bold 22px 'Courier New', monospace";
      ctx.textBaseline = "middle";
      ctx.fillText(`TURN: ${TURN_TEXT}`, 18, UI_HEIGHT / 2);

      ctx.fillStyle = "#9ec0ff";
      ctx.textAlign = "right";
      const windArrow = windValue < 0 ? "<" : ">";
      const windPower = Math.abs(windValue);
      ctx.fillText(`WIND: ${windArrow} ${windPower}`, WIDTH - 20, UI_HEIGHT / 2);
      ctx.textAlign = "left";
    }

    function drawTerrain(points) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      points.forEach((p) => ctx.lineTo(p.x, p.y));
      ctx.lineTo(WIDTH, HEIGHT);
      ctx.lineTo(0, HEIGHT);
      ctx.closePath();

      ctx.fillStyle = "#6e4a2a";
      ctx.fill();

      ctx.strokeStyle = "#52351d";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      points.forEach((p) => ctx.lineTo(p.x, p.y));
      ctx.stroke();
    }

    function drawCannon(baseX, baseY, flip = false) {
      const bodyW = 30;
      const bodyH = 18;
      const barrelW = 28;
      const barrelH = 8;
      const wheel = 12;

      ctx.fillStyle = "#8f95b5";
      ctx.fillRect(baseX - bodyW / 2, baseY - bodyH, bodyW, bodyH);

      ctx.fillStyle = "#d6d9e8";
      const barrelX = flip ? baseX - barrelW - 8 : baseX + 8;
      const barrelY = baseY - bodyH + 4;
      ctx.fillRect(barrelX, barrelY, barrelW, barrelH);

      ctx.fillStyle = "#3a4060";
      ctx.fillRect(baseX - wheel / 2, baseY - 4, wheel, wheel);
    }

    function render() {
      ctx.fillStyle = "#0d1f72";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      drawUi();

      const terrain = createTerrainPoints();
      drawTerrain(terrain);

      const leftX = 56;
      const rightX = WIDTH - 56;
      const leftY = terrainHeightAt(terrain, leftX);
      const rightY = terrainHeightAt(terrain, rightX);

      drawCannon(leftX, leftY, false);
      drawCannon(rightX, rightY, true);
    }

    render();
  </script>
</body>

</html>
