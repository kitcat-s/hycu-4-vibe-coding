<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 할 일</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Pretendard", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>

<body class="min-h-screen bg-stone-50 font-sans text-stone-800 antialiased">
  <main class="mx-auto flex min-h-screen max-w-lg flex-col px-4 py-12 sm:py-16">
    <h1 class="mb-10 text-center text-2xl font-semibold tracking-tight text-stone-900 sm:text-3xl">오늘의 할 일</h1>

    <div class="rounded-2xl border border-stone-200/80 bg-white p-5 shadow-sm sm:p-6">
      <form id="todo-form" class="flex flex-col gap-3 sm:flex-row sm:items-stretch">
        <label for="todo-input" class="sr-only">할 일 입력</label>
        <input id="todo-input" type="text" name="todo" autocomplete="off" placeholder="할 일을 입력하세요" maxlength="200"
          class="min-h-[44px] flex-1 rounded-xl border border-stone-200 bg-stone-50/50 px-4 py-2.5 text-stone-800 placeholder:text-stone-400 outline-none transition focus:border-stone-400 focus:bg-white focus:ring-2 focus:ring-stone-200" />
        <button type="submit"
          class="min-h-[44px] shrink-0 rounded-xl bg-stone-900 px-6 py-2.5 text-sm font-medium text-white transition hover:bg-stone-800 active:scale-[0.98]">
          추가
        </button>
      </form>

      <ul id="todo-list" class="mt-6 divide-y divide-stone-100 empty:hidden" aria-live="polite"></ul>
      <p id="empty-hint" class="mt-6 text-center text-sm text-stone-400">
        아직 할 일이 없습니다. 위에 입력해 보세요.
      </p>
    </div>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = "hycu-todo-list-v1";
      const form = document.getElementById("todo-form");
      const input = document.getElementById("todo-input");
      const list = document.getElementById("todo-list");
      const emptyHint = document.getElementById("empty-hint");
      let todoCheckboxId = 0;

      const escapeHtml = function (s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      };

      const loadTodos = function () {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed
            .filter(function (item) {
              return item && typeof item.text === "string";
            })
            .map(function (item) {
              return {
                text: String(item.text).trim().slice(0, 200),
                done: Boolean(item.done),
              };
            })
            .filter(function (item) {
              return item.text.length > 0;
            });
        } catch (err) {
          return [];
        }
      };

      let todos = loadTodos();

      const persist = function () {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        } catch (err) { }
      };

      const syncEmptyState = function () {
        const hasItems = todos.length > 0;
        emptyHint.classList.toggle("hidden", hasItems);
      };

      const render = function () {
        list.innerHTML = "";
        todos.forEach(function (todo, index) {
          const cbId = "todo-done-" + String(++todoCheckboxId);
          const li = document.createElement("li");
          li.className =
            "flex items-start gap-3 py-3 text-[15px] leading-snug first:pt-0 last:pb-0";
          li.innerHTML =
            '<input type="checkbox" id="' +
            cbId +
            '" class="peer mt-0.5 h-4 w-4 shrink-0 cursor-pointer rounded border-stone-300 text-stone-800 accent-stone-800 focus:ring-2 focus:ring-stone-300 focus:ring-offset-0" aria-label="완료 표시" />' +
            '<label for="' +
            cbId +
            '" class="min-w-0 flex-1 cursor-pointer select-none text-stone-700 peer-checked:text-stone-400 peer-checked:line-through">' +
            escapeHtml(todo.text) +
            "</label>";

          const checkbox = li.querySelector('input[type="checkbox"]');
          checkbox.checked = todo.done;
          checkbox.addEventListener("change", function () {
            todos[index].done = checkbox.checked;
            persist();
          });

          const delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className =
            "flex h-8 w-8 shrink-0 items-center justify-center rounded-lg text-lg leading-none text-stone-400 transition hover:bg-stone-100 hover:text-stone-700 focus:outline-none focus:ring-2 focus:ring-stone-300";
          delBtn.setAttribute("aria-label", "삭제");
          delBtn.textContent = "\u00D7";
          delBtn.addEventListener("click", function () {
            todos.splice(index, 1);
            persist();
            render();
          });
          li.appendChild(delBtn);
          list.appendChild(li);
        });
        syncEmptyState();
      };

      const addTodo = function (text) {
        const trimmed = text.trim();
        if (!trimmed) return;
        todos.push({ text: trimmed.slice(0, 200), done: false });
        persist();
        render();
      };

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        addTodo(input.value);
        input.value = "";
        input.focus();
      });

      render();
    })();
  </script>
</body>

</html>
